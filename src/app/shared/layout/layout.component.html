<div class="min-h-screen">
    <div class="lg:flex md:min-h-screen sm:min-h-screen bg-gray-100 ">
        <div class="lg:w-72 bg-blue-900  flex flex-col  justify-between lg:justify-start ">
            <div class="flex justify-between mt-1 px-5 break-words">
                <p class="text-white text-2xl md:text-4xl font-black text-center break-words w-40">@if (usuario()) { <span>{{usuario()?.nombre}}</span> }</p>
                <img 
                    src="img/settings-claro.svg" 
                    alt="Settings"
                    width="30" 
                    height="30" 
                    priority
                    class="cursor-pointer"
                    (click)="tuerca()"
                />
                
            </div>
            @if (panel()) {
                <div class="flex flex-col mt-2 ml-5 py-2">
                    <button
                        (click)="logout()"
                        class="text-white text-left py-2 hover:text-blue-300 hover:translate-x-3"
                    >
                        Cerrar sesión
                    </button>
                </div>
            }

            <nav class="grid grid-cols-4 lg:px-5 mt-4 sm:mt-10 lg:flex lg:flex-col lg:justify-start h-5/6">
                <ul>
                    <li >
                        <a
                            routerLink="/productos"
                            routerLinkActive="lg:bg-blue-950 lg:border-none border-b-gray-300 border-b-2 lg:rounded-md"
                            class="text-sm text-center lg:text-left sm:text-xl lg:text-2xl  block p-2 mt-2 hover:text-blue-300 text-white"
                        >
                            Productos
                        </a>
                    </li>
                    <li >
                        <a
                            routerLink="/nuevoproducto"
                            routerLinkActive="lg:bg-blue-950 lg:border-none border-b-gray-300 border-b-2 lg:rounded-md "
                            class="text-sm text-center lg:text-left sm:text-xl lg:text-2xl  block p-2 mt-2 hover:text-blue-300 text-white"
                        >
                        Nuevo Producto
                        </a>
                    </li>

                </ul>
            </nav>
        </div>

        <div class=" lg:w-full lg:p-10 h-screen  overflow-x-auto ">
            <router-outlet />
        </div>

    </div>
</div>
