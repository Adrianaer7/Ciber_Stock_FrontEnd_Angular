<div class="absolute lg:relative min-w-full m-0">
    <h1 class="font-black  text-3xl sm:text-4xl text-teal-900 text-center mt-2 sm:mt-0 mb-4 ">Listado de rubros</h1>
    <div class="flex flex-col-reverse sm:flex-row justify-end h-14">
        
        <button
            class="bg-teal-800 hover:bg-teal-900 rounded-lg hover:cursor-pointer text-white shadow-md px-4 font-bold uppercase "
            (click)="switchMostrarForm()"
        >
            {{mostrarForm() ? "CANCELAR" : "AGREGAR"}}
        </button>
    </div>
</div>

@if (mostrarForm()) {
    <div class=" py-3 bg-white rounded-lg mt-6 mx-auto lg:w-2/4">

        <form
            (ngSubmit)="onSubmit()"
            [formGroup]="formRubro"
        >
            <div class="flex justify-between px-2 gap-2">
                <div>
                    <label htmlFor="nombre" class="text-gray-800  font-bold font">Nombre</label>
                    <input
                        type="text"
                        name="nombre"
                        autoComplete="off"
                        class="bg-gray-50    focus:outline-none  focus:ring-1 focus:ring-blue-300 uppercase w-full p-2 rounded-md border-none active:ring-1 shadow-sm placeholder-gray-500"
                        placeholder="Almacenamiento"
                        formControlName="nombre"
                    />
                </div>
                <div>
                    <label htmlFor="rentabilidad" class="text-gray-800  font-bold font">Rentabilidad</label>

                    <input
                        type="number"
                        name="rentabilidad"
                        autoComplete="off"
                        list="rentabilidad"
                        class="bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300  uppercase w-full p-2 rounded-md border-none active:ring-1 shadow-sm placeholder-gray-500"
                        placeholder="30"
                        formControlName="rentabilidad"
                    />
                </div>

                <button class=" mt-5 bg-blue-900 text-white px-2 items-end rounded-lg font-bold uppercase hover:cursor-pointer">
                    Guardar
                </button>
            </div>
        </form>
    </div>
}


<table class="relative top-44 sm:top-44 lg:top-0 lg:w-2/4 mx-auto w-full mt-5 table-fixed shadow rounded-lg  bg-white">
    <thead class="bg-teal-600 text-white">
        <tr class="hover:cursor-pointer select-none">
            <th class="p-2 rounded-tl-lg break-words">NOMBRE</th>
            <th class="break-words">RENTABILIDAD</th>
            <th class="rounded-tr-lg w-32">ACCIONES</th>
        </tr>
    </thead>
    <tbody>

        @for (rubro of rubros(); track rubro._id) {
            <!--la class contents hace que angular no añada al DOM el "div" <rubro></rubro> entonces del tbody va directo al tr-->
            <rubro class="contents"
                [rubro]="rubro"
                [crearNuevo]="crearNuevo()"
            >
            </rubro>
        }
        
    </tbody>
</table>
