@if (cambioCorrecto()) {
<div class="grid grid-cols-1 gap-52 mt-10 mx-auto">
    <h1 class="font-black text-4xl text-center my-auto text-blue-900 uppercase">Reestablecer contraseña</h1>
    <div class="block mx-auto bg-red-600 rounded-lg  text-white text-4xl xs:2xl text-center my-auto font-black p-6 shadow-xl ">Su contraseña ha sido cambiada correctamente</div>
    <p routerLink="/" class=" uppercase mx-auto text-4xl hover:text-blue-900 duration-300 cursor-pointer">Volver a inicio</p>
</div>
} @else {
    <div class='w-2/4 mx-auto my-32 '>
        <h1 class="font-black text-4xl text-center text-blue-900 ">Nueva Contraseña</h1>
        <p class="mt-3 text-center text-black">Llena el campo para cambiar tu contraseña</p>
        @if (mensajeForm()) {<mensaje [mensaje]="mensajeForm()"/>}
        <div class='bg-white  mt-10 px-5 pb-3 rounded-md shadow-md md:w-3/4 mx-auto'>
            <form
                    class="mt-10"
                (ngSubmit)="onSubmit()"
                [formGroup]="formNuevaPassword"
            >
                <div class="mb-4">
                    <label htmlFor="password" class="text-gray-800 font-bold">Contraseña nueva</label>
                    <input
                        type="password"
                        autoComplete="new-password"
                        class="mt-2 block w-full p-3 rounded-md bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300 placeholder-gray-500"
                        id="password"
                        placeholder="Ingresa tu contraseña"
                        name="password"
                        formControlName="password"
                    />
                </div>
                <div class="mb-4">
                    <label htmlFor="confirmar" class="text-gray-800 font-bold">Confirmar Contraseña</label>
                    <input
                        type="password"
                        autoComplete="new-password"
                        class="mt-2 block w-full p-3 rounded-md bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300 placeholder-gray-500"
                        id="confirmar"
                        placeholder="Ingresa tu contraseña nuevamente"
                        name="confirmar"
                        formControlName="confirmar"
                    />
                </div>
    
                <input
                    type="submit"
                    value="Guardar nueva contraseña"
                    class="mt-5 w-full bg-blue-800  p-3 text-white uppercase font-bold text-lg rounded-md cursor-pointer"
                />
            </form>
        </div>
        <div class="flex justify-center w-3/4 mx-auto">
            <p routerLink="/" class="pt-5 hover:text-blue-400 font-medium cursor-pointer">
                Iniciar sesion
            </p>
        </div>
    </div>
}
