<div class='sm:w-3/5 xl:w-2/5 sm:mx-auto mr-1 ml-1 my-10 sm:my-32 '>
    <h1 class="font-black text-4xl text-center text-blue-900 ">Nueva cuenta</h1>
    <p class="mt-3 text-center text-black">Llena los siguientes campos para crear una cuenta</p>
    @if (mensajeForm()) {<mensaje [mensaje]="mensajeForm()"/>}
    <div class='bg-white  mt-10 px-5 pb-3 rounded-md shadow-md md:w-3/4 mx-auto'>
        <form
            class="mt-10"
            (ngSubmit)="onSubmit()"
            [formGroup]="nuevoUsuario"
        >
            <div class="mb-4 py-2">
                <label htmlFor="nombre" class="text-gray-800 font-bold">Nombre</label>
                <input 
                    type="text"
                    autoComplete="off"
                    class="mt-2 block w-full p-3 rounded-md bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300 placeholder-gray-500"
                    id="nombre"
                    placeholder="Ingresa tu nombre"
                    name="nombre"
                    formControlName="nombre"
                />
            </div>
            <div class="mb-4">
                <label htmlFor="email" class="text-gray-800 font-bold ">Email</label>
                <input
                    type="email"
                    autoComplete="nope"
                    class="mt-2 block w-full p-3 rounded-md bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300 placeholder-gray-500"
                    id="email"
                    placeholder="Ingresa tu email"
                    name="email"
                    formControlName="email"
                />
            </div>
            <div class="mb-4">
                <label htmlFor="password" class="text-gray-800 font-bold">Contraseña</label>
                <input
                    type="password"
                    autoComplete="new-password"
                    class="mt-2 block w-full p-3 rounded-md bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300 placeholder-gray-500"
                    id="password"
                    placeholder="Ingresa tu contraseña"
                    name="password"
                    formControlName="password"
                />
            </div>
            <div class="mb-4">
                <label htmlFor="confirmar" class="text-gray-800 font-bold">Confirmar Contraseña</label>
                <input
                    type="password"
                    autoComplete="nope"
                    class="mt-2 block w-full p-3 rounded-md bg-gray-50  focus:outline-none  focus:ring-1 focus:ring-blue-300 placeholder-gray-500"
                    id="confirmar"
                    placeholder="Repite tu contraseña"
                    name="confirmar"
                    formControlName="confirmar"
                />
            </div>

                <input
                    type="submit"
                    value="Crear Usuario"
                    class="mt-5 w-full bg-blue-800  p-3 text-white uppercase font-bold text-lg rounded-md cursor-pointer"
                />
        </form>
        
    </div>
    <div class="flex flex-col items-center sm:mx-auto sm:justify-between sm:w-3/4 ">
        <a 
            routerLink="/" 
            class="pt-5 hover:text-blue-400 font-medium cursor-pointer"
        >
            Ya tengo cuenta
        </a>
        <a 
            routerLink="/olvide-password" 
            class="pt-5 hover:text-blue-400 font-medium cursor-pointer"
        >
            Olvidé mi contraseña
        </a>
    </div>
</div>
